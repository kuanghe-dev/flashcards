<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chinese Flashcards</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <button id="sidebar-toggle" title="Toggle sidebar">&#8249;</button>

  <aside id="sidebar">
    <h2>Files</h2>
    <div id="file-list"></div>
    <button id="start-btn" disabled>Start</button>
  </aside>

  <main id="main">
    <div id="character"></div>
    <div id="message">Select files and press Start</div>
    <div id="hint"></div>
    <div id="progress"></div>
  </main>

  <script src="flashcards.js" defer></script>
</body>

</html>
