<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chinese Flashcards</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      min-height: 100vh;
      background: #1a1a2e;
      color: #eee;
      font-family: sans-serif;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 220px;
      flex-shrink: 0;
      background: #16213e;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1rem;
      gap: 0.75rem;
      border-right: 1px solid #0f3460;
    }

    #sidebar h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a0aec0;
      margin-bottom: 0.25rem;
    }

    #file-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      flex: 1;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.6rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .file-item:hover {
      background: #0f3460;
    }

    .file-item input[type="checkbox"] {
      accent-color: #e94560;
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .file-item label {
      cursor: pointer;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #start-btn {
      margin-top: auto;
      padding: 0.65rem 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    #start-btn:hover:not(:disabled) {
      background: #c73652;
    }

    #start-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Main area ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    #character {
      font-size: 40vmin;
      line-height: 1;
      transition: opacity 0.15s ease;
    }

    #character.fade {
      opacity: 0;
    }

    #progress {
      position: absolute;
      bottom: 1.5rem;
      font-size: 1rem;
      opacity: 0.4;
    }

    #message {
      font-size: 2rem;
      opacity: 0.6;
      text-align: center;
      padding: 1rem;
    }

    #hint {
      position: absolute;
      top: 1.5rem;
      font-size: 0.85rem;
      opacity: 0.3;
    }
  </style>
</head>

<body>
  <aside id="sidebar">
    <h2>Files</h2>
    <div id="file-list"></div>
    <button id="start-btn" disabled>Start</button>
  </aside>

  <main id="main">
    <div id="character"></div>
    <div id="message">Select files and press Start</div>
    <div id="hint"></div>
    <div id="progress"></div>
  </main>

  <script src="flashcards.js" defer></script>
</body>

</html>
